<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>后台管理系统 - 登录</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root {
            --primary-color: #4e73df;
            --bg-gradient: linear-gradient(135deg, #4e73df 0%, #224abe 100%);
        }

        body, html {
            height: 100%;
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        /* 左侧渐变及动画背景 */
        .login-left {
            background: var(--bg-gradient);
            position: relative;
            overflow: hidden;
        }

        /* 简单的动态悬浮气泡效果 */
        .login-left::before {
            content: "";
            position: absolute;
            width: 300px;
            height: 300px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 50%;
            top: -50px;
            left: -50px;
            animation: floating 6s infinite ease-in-out;
        }
        
        .login-left::after {
            content: "";
            position: absolute;
            width: 200px;
            height: 200px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 50%;
            bottom: -30px;
            right: -30px;
            animation: floating 8s infinite ease-in-out 1s;
        }

        @keyframes floating {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(10deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }

        /* 右侧登录垂直居中 */
        .login-right {
            background-color: #ffffff;
        }

        .login-form-wrapper {
            width: 100%;
            max-width: 420px;
            padding: 2rem;
        }

        /* 输入框聚焦样式优化 */
        .form-control:focus {
            border-color: #bac8f3;
            box-shadow: 0 0 0 0.25rem rgba(78, 115, 223, 0.25);
        }

        /* 简单精致的 Footer 样式 */
        .login-footer {
            font-size: 0.75rem;
            color: #adb5bd;
        }
    </style>
</head>
  
<body>

<div class="container-fluid h-100 p-0">
    <div class="row g-0 h-100">
        
        <div class="col-lg-7 col-xl-8 d-none d-lg-flex flex-column justify-content-center align-items-center text-white login-left p-5">
            <div class="text-center" style="max-width: 550px; z-index: 10;">
                <div class="display-4 mb-4">
                    <i class="bi bi-cloud-arrow-up-fill"></i>
                </div>
                <h1 class="fw-bold mb-3">Matrix Admin System</h1>
                <p class="lead text-white-50 mb-5">高效、稳定、安全的下一代企业级数字化资产与业务数据管理平台。</p>
                
                <div id="introCarousel" class="carousel slide" data-bs-ride="carousel">
                    <div class="carousel-indicators">
                        <button type="button" data-bs-target="#introCarousel" data-bs-slide-to="0" class="active"></button>
                        <button type="button" data-bs-target="#introCarousel" data-bs-slide-to="1"></button>
                        <button type="button" data-bs-target="#introCarousel" data-bs-slide-to="2"></button>
                    </div>
                    <div class="carousel-inner pb-4">
                        <div class="carousel-item active">
                            <h5 class="fw-semibold"><i class="bi bi-lightning-charge-fill me-2"></i> 极速响应架构</h5>
                            <p class="small text-white-50">基于最新技术栈构建，毫秒级数据渲染与高并发支持。</p>
                        </div>
                        <div class="carousel-item">
                            <h5 class="fw-semibold"><i class="bi bi-shield-lock-fill me-2"></i> 银行级安全防护</h5>
                            <p class="small text-white-50">多重加密、动态权限控制，全面保障企业核心资产安全。</p>
                        </div>
                        <div class="carousel-item">
                            <h5 class="fw-semibold"><i class="bi bi-pie-chart-fill me-2"></i> 智能数据可视化</h5>
                            <p class="small text-white-50">多维度敏捷报表，助力企业主实时掌控精准业务走向。</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-12 col-lg-5 col-xl-4 d-flex flex-column justify-content-between login-right p-4">
            
            <div class="d-none d-lg-block" style="height: 40px;"></div>
            
            <div class="login-form-wrapper mx-auto">
                <div class="text-center d-lg-none mb-4">
                    <h2 class="fw-bold text-primary">Matrix Admin</h2>
                    <p class="text-muted small">欢迎回来，请登录您的账户</p>
                </div>
                
                <div class="d-none d-lg-block mb-5">
                    <h3 class="fw-bold text-dark mb-2">欢迎回来</h3>
                    <p class="text-muted small">请在下方输入您的凭证以进入系统</p>
                </div>

                <form action="#" method="POST">
                    <div class="mb-4">
                        <label for="username" class="form-label small fw-semibold text-secondary">用户名 / 邮箱</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0 text-muted"><i class="bi bi-person"></i></span>
                            <input type="text" class="form-control bg-light border-start-0 ps-0" id="username" placeholder="请输入用户名" value="feng6@1234.com" required>
                        </div>
                    </div>

                    <div class="mb-3">
                        <div class="d-flex justify-content-between align-items-center mb-1">
                            <label for="password" class="form-label small fw-semibold text-secondary mb-0">密码</label>
                            <a href="#" class="text-decoration-none small text-primary" style="font-size: 0.8rem;">忘记密码？</a>
                        </div>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0 text-muted"><i class="bi bi-lock"></i></span>
                            <input type="password" class="form-control bg-light border-start-0 ps-0" id="password" placeholder="请输入密码" value="xzpp1234" required>
                        </div>
                    </div>

                    <div class="mb-4 form-check">
                        <input type="checkbox" class="form-check-input" id="rememberMe">
                        <label class="form-check-label small text-muted" for="rememberMe">保持登录状态</label>
                    </div>

                    <button id="loginBtn" type="button" class="btn btn-primary w-100 py-2 fw-semibold mb-4 shadow-sm" style="background-color: var(--primary-color); border: none;">
                        登 录
                    </button>
                    
                    <div class="text-center">
                        <span class="small text-muted" style="font-size: 0.8rem;">遇到问题？联系 <a href="#" class="text-decoration-none text-primary">系统管理员</a></span>
                    </div>
                </form>
            </div>

            <div class="login-footer text-center mt-4">
                <p class="mb-0">&copy; 2026 Matrix Studio. All rights reserved.</p>
            </div>
            
        </div>

    </div>
</div>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script  th:src="@{/js/jquery-3.7.1.min.js}"></script>
    <script  th:src="@{/js/jquery.cookie-1.4.1.min.js}"></script>
    <script type="text/javascript" th:inline="javascript">
   			/*<![CDATA[*/
   				var contextPath = /*[[@{/}]]*/ '';
   			/*]]>*/
	</script>
	<script>
	$('#loginBtn').click( function() {
        var username = $("#username").val();
        var password = $("#password").val();

        var dd  = {"email":username,"password":password};
        $.ajax({
          type:"POST",
          url:contextPath +"api/user/login",
          data: JSON.stringify(dd) ,
          contentType: "application/json; charset=utf-8",
		  datatype: "json",
          success:function(data){
              console.log(data);
              $.cookie("email", data.user.email);
              $.cookie("accessToken", data.token);
              var ref_url = contextRoot+"index";
              console.log("email=" + $.cookie("email") );
              console.log("email=" + $.cookie("accessToken") );
              //console.log("ref_url=" + ref_url);
              //window.location.href= ref_url;
          },
          complete: function(XMLHttpRequest, textStatus){
              console.log("completed");
         },
       });
    });
    
	</script>
  </body>


</html>
