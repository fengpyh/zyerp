<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::content})}">
<body>
<th:block th:fragment="content">
    <div class="row g-4">
        <div class="col-md-6 col-lg-3 animate-fade-in animate-fade-in-1">
            <div class="card h-100">
                <div class="card-body">
                    <div class="d-flex align-items-center">
                        <div class="avatar avatar-lg bg-label-primary rounded me-3">
                            <i class="bi bi-eye fs-4"></i>
                        </div>
                        <div>
                            <h6 class="mb-0 text-muted" th:text="#{nav.pvuv}">PV/UV</h6>
                            <h4 class="mb-0">12.4k</h4>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-md-6 col-lg-3 animate-fade-in animate-fade-in-2">
            <div class="card h-100">
                <div class="card-body">
                    <div class="d-flex align-items-center">
                        <div class="avatar avatar-lg bg-label-success rounded me-3">
                            <i class="bi bi-people fs-4"></i>
                        </div>
                        <div>
                            <h6 class="mb-0 text-muted" th:text="#{nav.users}">Users</h6>
                            <h4 class="mb-0">2,847</h4>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-md-6 col-lg-3 animate-fade-in animate-fade-in-3">
            <div class="card h-100">
                <div class="card-body">
                    <div class="d-flex align-items-center">
                        <div class="avatar avatar-lg bg-label-info rounded me-3">
                            <i class="bi bi-chat-square-text fs-4"></i>
                        </div>
                        <div>
                            <h6 class="mb-0 text-muted" th:text="#{nav.topics}">Topics</h6>
                            <h4 class="mb-0">1,234</h4>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-md-6 col-lg-3 animate-fade-in animate-fade-in-4">
            <div class="card h-100">
                <div class="card-body">
                    <div class="d-flex align-items-center">
                        <div class="avatar avatar-lg bg-label-warning rounded me-3">
                            <i class="bi bi-newspaper fs-4"></i>
                        </div>
                        <div>
                            <h6 class="mb-0 text-muted" th:text="#{nav.news}">News</h6>
                            <h4 class="mb-0">48</h4>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div class="card mt-4 animate-fade-in">
        <div class="card-body">
            <p class="text-muted mb-0" th:text="#{page.dashboard.welcome}">Welcome to the admin dashboard.</p>
        </div>
    </div>
    
    
    <div class="card mt-4 animate-fade-in">
        <div class="card-body">
        <div class="p-4 flex-grow-1" id="dashboard-main-content">1
        </div>
        </div>
    </div>
</th:block>

</body>
</html>
