<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::content})}">
<body>
<th:block th:fragment="content">
    <p class="text-muted mb-4 animate-fade-in" th:text="#{page.signup.description}">Sample signup form.</p>
    <div class="row justify-content-center animate-fade-in">
        <div class="col-md-6 col-lg-5">
            <div class="card">
                <div class="card-body p-4">
                    <h5 class="card-title mb-4" th:text="#{page.signup.title}">Signup</h5>
                    <form>
                        <div class="mb-3">
                            <label class="form-label" th:text="#{auth.email}">Email</label>
                            <input type="email" class="form-control" name="email" required placeholder="name@example.com"/>
                        </div>
                        <div class="mb-3">
                            <label class="form-label" th:text="#{auth.password}">Password</label>
                            <input type="password" class="form-control" name="password" required/>
                        </div>
                        <div class="mb-4">
                            <label class="form-label" th:text="#{auth.confirmPassword}">Confirm password</label>
                            <input type="password" class="form-control" name="confirmPassword" required/>
                        </div>
                        <button type="submit" class="btn btn-primary w-100" th:text="#{auth.signup}">Sign up</button>
                    </form>
                    <p class="mt-3 mb-0 text-center small text-muted">
                        <a th:href="@{/admin/signin}" th:text="#{auth.signin}">Sign in</a> if you already have an account.
                    </p>
                </div>
            </div>
        </div>
    </div>
</th:block>
</body>
</html>
