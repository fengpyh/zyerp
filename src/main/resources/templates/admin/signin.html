<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::content})}">
<body>
<th:block th:fragment="content">
    <p class="text-muted mb-4 animate-fade-in" th:text="#{page.signin.description}">Sample sign-in form.</p>
    <div class="row justify-content-center animate-fade-in">
        <div class="col-md-6 col-lg-5">
            <div class="card">
                <div class="card-body p-4">
                    <h5 class="card-title mb-4" th:text="#{page.signin.title}">Sign in</h5>
                    <form>
                        <div class="mb-3">
                            <label class="form-label" th:text="#{auth.email}">Email</label>
                            <input type="email" class="form-control" name="email" required placeholder="name@example.com"/>
                        </div>
                        <div class="mb-3">
                            <label class="form-label" th:text="#{auth.password}">Password</label>
                            <input type="password" class="form-control" name="password" required/>
                        </div>
                        <div class="mb-3 d-flex justify-content-between align-items-center">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" name="remember" id="remember"/>
                                <label class="form-check-label" for="remember" th:text="#{auth.rememberMe}">Remember me</label>
                            </div>
                            <a th:href="@{/admin/forgot-password}" class="small" th:text="#{auth.forgotPassword}">Forgot password?</a>
                        </div>
                        <button type="submit" class="btn btn-primary w-100" th:text="#{auth.signin}">Sign in</button>
                    </form>
                    <p class="mt-3 mb-0 text-center small text-muted">
                        <a th:href="@{/admin/signup}" th:text="#{auth.signup}">Sign up</a> for a new account.
                    </p>
                </div>
            </div>
        </div>
    </div>
</th:block>
</body>
</html>
